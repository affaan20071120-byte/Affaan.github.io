<!DOCTYPE html>
<html>
<head>
<title>Payroll Management System</title>
<style>
body {
font-family: Poppins, system-ui, Arial, sans-serif;
background: radial-gradient(1200px 800px at 20% 10%, rgba(255,60,80,0.10), transparent 70%),
radial-gradient(1000px 700px at 80% 30%, rgba(58,160,255,0.12), transparent 70%),
linear-gradient(180deg, #0b0f2a, #2b0d3a);
color: #e7e8ee;
padding: 20px;
margin: 0;
display: flex;
align-items: center;
justify-content: center;
min-height: 100vh;
overflow-x: hidden;
}
.container {
max-width: 800px;
margin: 0 auto;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.12);
padding: 40px;
border-radius: 18px;
backdrop-filter: blur(6px);
box-shadow: 0 10px 30px rgba(0,0,0,0.3);
text-align: center;
}
h1 {
color: #e7e8ee;
text-shadow: 0 0 8px rgba(255,43,69,0.7), 0 0 18px rgba(255,43,69,0.5), 0 0 36px rgba(58,160,255,0.3);
-webkit-text-stroke: 1px rgba(255,43,69,0.3);
margin-bottom: 30px;
font-weight: 800;
}
.message {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.12);
padding: 20px;
border-radius: 16px;
margin: 20px 0;
backdrop-filter: blur(6px);
}
.footer {
margin-top: 30px;
color: #b7bbd0;
}
</style>
</head>
<body>
<div class="container">
<h1>🔐 Payroll Management System</h1>
<div class="message">
<h2>🚀 System Active</h2>
<p>You have successfully accessed the Payroll Management System.</p>
<p>This is where your React application code would be embedded or linked.</p>
</div>
<div class="footer">
<p style="color: #ff2b45;">💻 Developed by Mohammed Affaan Delvi</p>
</div>
</div>
</body>
</html>
